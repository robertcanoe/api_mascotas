site_name: API Mascotas
site_description: Documentacion oficial de la API REST en PHP
site_url: https://robertcanoe.github.io/api_mascotas/
repo_name: robertcanoe/api_mascotas
repo_url: https://github.com/robertcanoe/api_mascotas

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Arquitectura MVC: arquitectura.md
  - API:
      - Endpoints: api/endpoints.md
      - Postman: api/postman.md
      - Autenticacion JWT: api/autenticacion.md
  - Despliegue:
      - Render (Docker): deploy/render.md
      - Backend hosting PHP: deploy/backend-hosting.md
      - GitHub Actions: deploy/github-actions.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
