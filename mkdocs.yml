site_name: Protectora de Mascotas
site_description: API REST en PHP para adopciones de mascotas
site_url: https://example.com/docs
repo_name: protectora-mascotas
repo_url: https://github.com/tu-org/protectora-mascotas
theme:
  name: material
  language: es
  palette:
    primary: green
    accent: amber
nav:
  - Inicio: index.md
  - Arquitectura MVC: arquitectura.md
  - API:
      - Endpoints: api/endpoints.md
      - Postman: api/postman.md
      - Autenticacion JWT: api/autenticacion.md
  - Despliegue:
      - Backend Render (Docker): deploy/render.md
      - Backend hosting PHP: deploy/backend-hosting.md
      - GitHub Actions CD: deploy/github-actions.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
